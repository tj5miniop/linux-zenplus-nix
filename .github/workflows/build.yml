name: Update and Build Kernel
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable # Use Nix unstable - ensure this aligns with flake!

      - uses: cachix/cachix-action@v14
        with:
          name: linux-tkg-tj5miniop # Repo Name for Cachix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Update Flake
        run: nix flake update

      - name: Build Linux Kernel
        run: nix build . --print-build-logs # For debug

      - name: Commit changes
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: (Automated) update flake.lock"